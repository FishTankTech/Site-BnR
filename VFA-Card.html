<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bob & Robert — Business Card — Fisher Armstrong</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #f2ead9;
    --ink: #221d16;
    --ink-dim: rgba(34,29,22,0.62);
    --patina: #5c6b57;
    --patina-deep: #445040;
    --rule: rgba(34,29,22,0.85);
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    padding: 40px;
    background: #3a362f;
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    align-items: flex-start;
    font-family: 'Inter', sans-serif;
  }

  .card{
    width: 3.5in;
    height: 2in;
    background: var(--bg);
    color: var(--ink);
    position: relative;
    overflow: hidden;
    padding: 0.2in 0.24in;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* paper grain */
  .card::before{
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 12% 15%, rgba(34,29,22,0.05), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(34,29,22,0.05), transparent 45%);
    pointer-events: none;
    z-index: 0;
  }
  .card::after{
    content:"";
    position:absolute;
    inset:0;
    opacity:0.9;
    mix-blend-mode:multiply;
    pointer-events:none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'>\
<filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter>\
<rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/></svg>");
  }

  /* signature element: oversized watermark ampersand, bleeding off the edge,
     standing in for the sculptural mass the estate's work is made of */
  .amp-mark{
    position: absolute;
    right: -0.34in;
    top: -0.5in;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 3.05in;
    line-height: 1;
    color: var(--patina);
    opacity: 0.13;
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }

  /* double-rule museum-plaque frame */
  .frame{
    position: absolute;
    inset: 0.09in;
    border: 1px solid var(--ink);
    opacity: 0.55;
    z-index: 0;
    pointer-events: none;
  }
  .frame::after{
    content: "";
    position: absolute;
    inset: 3px;
    border: 1px solid var(--ink);
    opacity: 0.55;
  }

  .top{
    position: relative;
    z-index: 1;
  }

  .eyebrow{
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 7px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--patina-deep);
    margin-bottom: 5px;
  }

  .brand{
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .brand .amp{
    font-style: italic;
    color: var(--patina-deep);
  }

  .name{
    margin-top: 14px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    line-height: 1.1;
  }

  .role{
    margin-top: 5px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 8px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--patina-deep);
  }

  .bottom{
    position: relative;
    z-index: 1;
  }

  .rule{
    height: 1px;
    background: var(--rule);
    opacity: 0.3;
    margin-bottom: 8px;
  }

  .bottom-row{
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
  }

  .tagline{
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 10px;
    line-height: 1.3;
    color: var(--ink-dim);
    max-width: 1.6in;
  }

  .contact{
    text-align: right;
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    line-height: 1.7;
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .contact .row{
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .contact .label{
    color: var(--patina-deep);
    font-weight: 600;
  }

  .catalog{
    position: absolute;
    top: 0.2in;
    right: 0.3in;
    font-family: 'Inter', sans-serif;
    font-size: 6.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(34,29,22,0.4);
    z-index: 1;
  }

  @media print{
    body{ background: none; padding: 0; }
    .card{ box-shadow: none; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="frame"></div>
    <div class="amp-mark">&amp;</div>
    <div class="catalog">Catalog V&#8209;001</div>

    <div class="top">
      <div class="eyebrow">The Virtual Estate</div>
      <div class="brand">BOB <span class="amp">&amp;</span> ROBERT</div>
      <div class="name">Fisher Armstrong</div>
      <div class="role">Director of Curation &amp;&amp; Preservation</div>
    </div>

    <div class="bottom">
      <div class="rule"></div>
      <div class="bottom-row">
        <div class="tagline">To Document,<br>Is To Live.</div>
        <div class="contact">
          <div class="row"><span class="label">W</span><span>CremeanArchives.Online</span></div>
          <div class="row"><span class="label">E</span><span>TheCremeanArchives@Gmail.com</span></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
